name: build-test-deploy

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: docker.io
  GO_VERSION: "1.25.x"
  NODE_VERSION: "24"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install test tools
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@v3.27.1
          npm install --global newman@6

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Run backend and API tests
        run: make test-all

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-junit
          path: test-results/newman/*.xml
          if-no-files-found: warn

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: auth
            context: .
            dockerfile: services/auth/Dockerfile
          - name: matchmaking
            context: .
            dockerfile: services/matchmaking/Dockerfile
          - name: game
            context: .
            dockerfile: services/game/Dockerfile
          - name: rating
            context: .
            dockerfile: services/rating/Dockerfile
          - name: profile
            context: .
            dockerfile: services/profile/Dockerfile
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
          - name: migrations
            context: .
            dockerfile: deploy/migrations/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ vars.DOCKERHUB_USERNAME }}/online-checkers-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    name: Deploy production
    needs: build
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    concurrency:
      group: production
      cancel-in-progress: false
    env:
      KUBECONFIG: /tmp/kubeconfig
      NAMESPACE: ${{ vars.K8S_NAMESPACE }}
      IMAGE_NAMESPACE: ${{ vars.DOCKERHUB_USERNAME }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      INGRESS_IP: ${{ vars.INGRESS_IP }}
      LETSENCRYPT_EMAIL: ${{ vars.LETSENCRYPT_EMAIL }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure cluster access
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          if [ -z "$NAMESPACE" ]; then
            echo "GitHub variable K8S_NAMESPACE is required" >&2
            exit 1
          fi
          if [ -z "$IMAGE_NAMESPACE" ]; then
            echo "GitHub variable DOCKERHUB_USERNAME is required" >&2
            exit 1
          fi

          printf '%s' "$KUBE_CONFIG_B64" | base64 --decode > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
          kubectl version --client
          test "$(kubectl -n "$NAMESPACE" auth can-i get pods)" = "yes"

      - name: Create runtime secrets
        run: |
          namespace="$NAMESPACE"
          postgres_user="${POSTGRES_USER:-postgres}"
          postgres_db="${POSTGRES_DB:-checkers}"

          kubectl -n "$namespace" create secret generic postgres-secret \
            --from-literal=POSTGRES_USER="$postgres_user" \
            --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            --from-literal=POSTGRES_DB="$postgres_db" \
            --dry-run=client -o yaml \
            | kubectl apply -f -

          kubectl -n "$namespace" create secret generic app-runtime-secrets \
            --from-literal=database-url="$DATABASE_URL" \
            --dry-run=client -o yaml \
            | kubectl apply -f -

      - name: Deploy PostgreSQL and Redpanda
        run: |
          namespace="$NAMESPACE"

          helm upgrade --install postgres deploy/helm/postgres \
            --namespace "$namespace" \
            --atomic \
            --wait \
            --timeout 10m

          helm upgrade --install redpanda deploy/helm/redpanda \
            --namespace "$namespace" \
            --atomic \
            --wait \
            --timeout 10m

      - name: Run database migrations
        run: |
          namespace="$NAMESPACE"

          helm upgrade --install database-migrations deploy/helm/migrations \
            --namespace "$namespace" \
            --set-string image.repository="$REGISTRY/$IMAGE_NAMESPACE/online-checkers-migrations" \
            --set-string image.tag="$GITHUB_SHA" \
            --wait \
            --timeout 10m

      - name: Configure Let's Encrypt TLS
        run: |
          namespace="$NAMESPACE"

          if [ -z "$INGRESS_IP" ]; then
            echo "GitHub variable INGRESS_IP is required" >&2
            exit 1
          fi

          helm upgrade --install frontend-tls deploy/helm/tls \
            --namespace "$namespace" \
            --set-string certificate.ipAddress="$INGRESS_IP" \
            --set-string issuer.email="$LETSENCRYPT_EMAIL" \
            --wait \
            --timeout 5m

          kubectl -n "$namespace" wait \
            --for=condition=Ready certificate/frontend-tls \
            --timeout=10m

      - name: Deploy backend services
        run: |
          namespace="$NAMESPACE"

          for service in auth game matchmaking rating profile; do
            helm upgrade --install "$service" deploy/helm/app-service \
              --namespace "$namespace" \
              --values "deploy/helm/values/${service}.yaml" \
              --set-string image.repository="$REGISTRY/$IMAGE_NAMESPACE/online-checkers-${service}" \
              --set-string image.tag="$GITHUB_SHA" \
              --atomic \
              --wait \
              --timeout 10m
          done

      - name: Deploy frontend
        run: |
          namespace="$NAMESPACE"

          helm upgrade --install frontend deploy/helm/app-service \
            --namespace "$namespace" \
            --values deploy/helm/values/frontend.yaml \
            --set-string image.repository="$REGISTRY/$IMAGE_NAMESPACE/online-checkers-frontend" \
            --set-string image.tag="$GITHUB_SHA" \
            --set-string ingress.serverAlias="$INGRESS_IP" \
            --atomic \
            --wait \
            --timeout 10m

      - name: Show deployment status
        if: always()
        run: |
          namespace="$NAMESPACE"
          kubectl -n "$namespace" get \
            deployments,statefulsets,pods,services,ingresses,certificates
