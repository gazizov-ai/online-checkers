syntax = "proto3";

package online_checkers.events.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/gazizov-ai/online-checkers/gen/events/v1;eventsv1";

message UserRegistered {
  string event_id = 1;
  string user_id = 2;
  string username = 3;
  google.protobuf.Timestamp registered_at = 4;
}