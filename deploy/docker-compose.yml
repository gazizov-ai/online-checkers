services:
  postgres:
    image: postgres:16-alpine
    container_name: online-checkers-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: checkers
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d checkers" ]
      interval: 5s
      timeout: 3s
      retries: 10

  auth-service:
    build:
      context: ..
      dockerfile: services/auth/Dockerfile
    container_name: online-checkers-auth
    environment:
      SERVICE_NAME: auth-service
      HTTP_PORT: 8081
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/checkers?sslmode=disable
      JWT_SECRET: dev-secret
      KAFKA_BROKERS: redpanda:29092
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private.pem
      JWT_KEY_ID: dev-key-1
      OIDC_ISSUER: http://localhost:8081
      OIDC_AUDIENCE: online-checkers
      ACCESS_TOKEN_TTL: 15m
      ID_TOKEN_TTL: 15m
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../secrets/jwt_private.pem:/run/secrets/jwt_private.pem:ro

  matchmaking-service:
    build:
      context: ..
      dockerfile: services/matchmaking/Dockerfile
    container_name: online-checkers-matchmaking
    environment:
      SERVICE_NAME: matchmaking-service
      HTTP_PORT: 8082
      GAME_SERVICE_GRPC_ADDR: game-service:9093
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/checkers?sslmode=disable
      JWT_SECRET: dev-secret
      KAFKA_BROKERS: redpanda:29092
      JWKS_URL: http://auth-service:8081/.well-known/jwks.json
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy

  game-service:
    build:
      context: ..
      dockerfile: services/game/Dockerfile
    container_name: online-checkers-game
    environment:
      SERVICE_NAME: game-service
      HTTP_PORT: 8083
      GRPC_PORT: 9093
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/checkers?sslmode=disable
      JWT_SECRET: dev-secret
      KAFKA_BROKERS: redpanda:29092
      JWKS_URL: http://auth-service:8081/.well-known/jwks.json
    ports:
      - "8083:8083"
      - "9093:9093"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      redpanda:
        condition: service_started

  rating-service:
    build:
      context: ..
      dockerfile: services/rating/Dockerfile
    container_name: online-checkers-rating
    environment:
      SERVICE_NAME: rating-service
      HTTP_PORT: 8084
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/checkers?sslmode=disable
      JWT_SECRET: dev-secret
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

  profile-service:
    build:
      context: ..
      dockerfile: services/profile/Dockerfile
    container_name: online-checkers-profile
    environment:
      SERVICE_NAME: profile-service
      HTTP_PORT: 8086
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/checkers?sslmode=disable
      KAFKA_BROKERS: redpanda:29092
      USER_REGISTERED_TOPIC: user.registered
      PROFILE_CONSUMER_GROUP: profile-service
      OIDC_AUDIENCE: online-checkers
      JWKS_URL: http://auth-service:8081/.well-known/jwks.json
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      redpanda:
        condition: service_started

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: online-checkers-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - auth-service
      - matchmaking-service
      - game-service
      - rating-service
      - profile-service

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --overprovisioned
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8085:8080"
    depends_on:
      - redpanda

volumes:
  postgres_data:
  redpanda-data:
    driver: local
