services:
  postgres:
    image: postgres:16-alpine
    container_name: online-checkers-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: checkers
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  auth-service:
    build:
      context: ..
      dockerfile: services/auth/Dockerfile
    container_name: online-checkers-auth
    environment:
      SERVICE_NAME: auth-service
      HTTP_PORT: 8081
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/checkers?sslmode=disable
      JWT_SECRET: dev-secret
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8081:8081"
    depends_on:
      - postgres

  matchmaking-service:
    build:
      context: ..
      dockerfile: services/matchmaking/Dockerfile
    container_name: online-checkers-matchmaking
    environment:
      SERVICE_NAME: matchmaking-service
      HTTP_PORT: 8082
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/checkers?sslmode=disable
      JWT_SECRET: dev-secret
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8082:8082"
    depends_on:
      - postgres

  game-service:
    build:
      context: ..
      dockerfile: services/game/Dockerfile
    container_name: online-checkers-game
    environment:
      SERVICE_NAME: game-service
      HTTP_PORT: 8083
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/checkers?sslmode=disable
      JWT_SECRET: dev-secret
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8083:8083"
    depends_on:
      - postgres

  rating-service:
    build:
      context: ..
      dockerfile: services/rating/Dockerfile
    container_name: online-checkers-rating
    environment:
      SERVICE_NAME: rating-service
      HTTP_PORT: 8084
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/checkers?sslmode=disable
      JWT_SECRET: dev-secret
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8084:8084"
    depends_on:
      - postgres

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --overprovisioned
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:29092"]
    ports:
      - "8085:8080"
    depends_on:
      - redpanda

volumes:
  postgres_data:
  redpanda-data:
    driver: local
