{{- $ipAddress := required "certificate.ipAddress is required" .Values.certificate.ipAddress }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certificate.name }}
spec:
  secretName: {{ .Values.certificate.secretName }}
  ipAddresses:
    - {{ $ipAddress | quote }}
  issuerRef:
    name: {{ .Values.issuer.name }}
    kind: Issuer
    group: cert-manager.io
  privateKey:
    algorithm: {{ .Values.certificate.privateKey.algorithm }}
    size: {{ .Values.certificate.privateKey.size }}
    rotationPolicy: {{ .Values.certificate.privateKey.rotationPolicy }}
