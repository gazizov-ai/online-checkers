# deploy/helm/values/profile.yaml
nameOverride: profile-service

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  ports:
    - name: http
      port: 8086
      targetPort: 8086

env:
  SERVICE_NAME: profile-service
  HTTP_PORT: "8086"
  KAFKA_BROKERS: "redpanda:9092"
  USER_REGISTERED_TOPIC: "user.registered"
  PROFILE_CONSUMER_GROUP: "profile-service"
  OIDC_ISSUER: "http://auth-service:8081"
  OIDC_AUDIENCE: "online-checkers"
  JWKS_URL: "http://auth-service:8081/.well-known/jwks.json"
  JWT_KEY_ID: "dev-key-1"

secretEnv:
  DATABASE_URL:
    secretName: app-runtime-secrets
    secretKey: database-url
