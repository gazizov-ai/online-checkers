nameOverride: frontend

replicaCount: 1

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  serverAlias: ""
  host: online-checkers.local
  path: /
  pathType: Prefix
  servicePort: http
  tls:
    - hosts:
        - online-checkers.local
      secretName: frontend-tls

probes:
  enabled: true
  livenessPath: /
  readinessPath: /
  port: http

resources:
  requests:
    cpu: 20m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi
