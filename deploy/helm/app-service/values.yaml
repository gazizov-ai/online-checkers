nameOverride: ""

replicaCount: 1

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  serverAlias: ""
  host: ""
  path: /
  pathType: Prefix
  servicePort: http
  tls: []

env: {}

secretEnv: {}

probes:
  enabled: true
  livenessPath: /health
  readinessPath: /ready
  port: http

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

volumes: []
volumeMounts: []
