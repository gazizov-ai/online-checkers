services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: checkers
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d checkers"]
      interval: 1s
      timeout: 3s
      retries: 30

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --overprovisioned
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:19092
    ports:
      - "19092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 2s
      timeout: 5s
      retries: 30

  auth-service:
    build:
      context: ..
      dockerfile: services/auth/Dockerfile
    environment:
      SERVICE_NAME: auth-service
      HTTP_PORT: 8081
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/checkers?sslmode=disable
      KAFKA_BROKERS: redpanda:29092
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private.pem
      JWT_KEY_ID: dev-key-1
      OIDC_ISSUER: http://localhost:18081
      OIDC_AUDIENCE: online-checkers
    ports:
      - "18081:8081"
    volumes:
      - ${TEST_JWT_PRIVATE_KEY_PATH:-../secrets/jwt_private.pem}:/run/secrets/jwt_private.pem:ro
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  profile-service:
    build:
      context: ..
      dockerfile: services/profile/Dockerfile
    environment:
      SERVICE_NAME: profile-service
      HTTP_PORT: 8086
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/checkers?sslmode=disable
      KAFKA_BROKERS: redpanda:29092
      USER_REGISTERED_TOPIC: user.registered
      PROFILE_CONSUMER_GROUP: profile-service-e2e
      OIDC_ISSUER: http://localhost:18081
      OIDC_AUDIENCE: online-checkers
      JWKS_URL: http://auth-service:8081/.well-known/jwks.json
      JWT_KEY_ID: dev-key-1
    ports:
      - "18086:8086"
    depends_on:
      auth-service:
        condition: service_started
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  rating-service:
    build:
      context: ..
      dockerfile: services/rating/Dockerfile
    environment:
      SERVICE_NAME: rating-service
      HTTP_PORT: 8084
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/checkers?sslmode=disable
      KAFKA_BROKERS: redpanda:29092
      GAME_FINISHED_TOPIC: game.finished
      RATING_CONSUMER_GROUP: rating-service-e2e
    ports:
      - "18084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  game-service:
    build:
      context: ..
      dockerfile: services/game/Dockerfile
    environment:
      SERVICE_NAME: game-service
      HTTP_PORT: 8083
      GRPC_PORT: 9093
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/checkers?sslmode=disable
      KAFKA_BROKERS: redpanda:29092
      GAME_FINISHED_TOPIC: game.finished
      OIDC_ISSUER: http://localhost:18081
      OIDC_AUDIENCE: online-checkers
      JWKS_URL: http://auth-service:8081/.well-known/jwks.json
      JWT_KEY_ID: dev-key-1
    ports:
      - "18083:8083"
    depends_on:
      auth-service:
        condition: service_started
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  matchmaking-service:
    build:
      context: ..
      dockerfile: services/matchmaking/Dockerfile
    environment:
      SERVICE_NAME: matchmaking-service
      HTTP_PORT: 8082
      GAME_SERVICE_GRPC_ADDR: game-service:9093
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/checkers?sslmode=disable
      OIDC_ISSUER: http://localhost:18081
      OIDC_AUDIENCE: online-checkers
      JWKS_URL: http://auth-service:8081/.well-known/jwks.json
      JWT_KEY_ID: dev-key-1
    ports:
      - "18082:8082"
    depends_on:
      auth-service:
        condition: service_started
      game-service:
        condition: service_started
      postgres:
        condition: service_healthy
